baseURL: "https://manojsankuru.github.io/"
title: "Manoj Sankuru"
theme: "PaperMod"
publishDir: "docs"

minify:
  disableXMLMin: false
  minifyOutput: true

markup:
  goldmark:
    renderer:
      unsafe: true

params:
  env: "production"
  title: "Manoj Sankuru"
  description: "PhD Researcher at Clemson University working at the intersection of large language models, reinforcement learning, and multi-agent systems."

  defaultTheme: light
  disableThemeToggle: true
  ShowShareButtons: false
  ShowCodeCopyButtons: true

  assets:
    disableFingerprinting: false   # Re-enabled; .gitattributes keeps CSS as binary so CRLF/LF SRI mismatch is gone

  socialIcons:
    - name: "github"
      url: "https://github.com/manojsankuru"
    - name: "googlescholar"
      url: "https://scholar.google.com/"
    - name: "linkedin"
      url: "https://www.linkedin.com/in/manoj-noah-s-0426b5165/"
    - name: "email"
      url: "mailto:msankur@clemson.edu"

# The new design uses an in-page scroll nav rendered by layouts/_partials/header.html;
# leave this empty so Hugo doesn't inject menu items.
menu:
  main: []
