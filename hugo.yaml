baseURL: "https://manojsankuru.github.io/"
title: "Manoj Sankuru | Research Portfolio"
theme: "PaperMod"

minify:
  disableXMLMin: false
  minifyOutput: true

params:
  env: "production"
  title: "Manoj Sankuru"
  description: "PhD Researcher focusing on Artificial Intelligence, LLMs, and Systems Engineering."
  
  # Minimalist Profile Mode Homepage Configuration
  profileMode:
    enabled: true
    title: "Manoj Sankuru"
    subtitle: "PhD Researcher & Graduate Assistant | Core Interests: LLMs, Multi-Agent Systems, & Program Analysis"
    imageUrl: "images/profile.jpg" # Drop your headshot image into static/images/profile.jpg
    imageWidth: 150
    imageHeight: 150
    buttons:
      - name: "Research Projects"
        url: "/projects/"
      - name: "Publications"
        url: "/publications/"

  # Connected Identity Networks
  socialIcons:
    - name: "github"
      url: "https://github.com/manojsankuru"
    - name: "googlescholar"
      url: "https://scholar.google.com/"
    - name: "linkedin"
      url: "https://linkedin.com/"
    - name: "email"
      url: "mailto:your-email@university.edu"

menu:
  main:
    - name: "Projects"
      url: "/projects/"
      weight: 10
    - name: "Publications"
      url: "/publications/"
      weight: 20
    - name: "CV"
      url: "/cv.pdf" # Drop your academic CV into static/cv.pdf
      weight: 30