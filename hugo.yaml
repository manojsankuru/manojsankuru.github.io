baseURL: "https://manojsankuru.github.io/"
title: "Manoj Sankuru"
theme: "PaperMod"
publishDir: "docs"

minify:
  disableXMLMin: false
  minifyOutput: true

markup:
  goldmark:
    renderer:
      unsafe: true   # Required to render <br> tags in profileMode subtitle

params:
  env: "production"
  title: "Manoj Sankuru"
  description: "PhD Researcher in Computer & Information Sciences at Clemson University focusing on LLMs, Multi-Agent Systems, and Program Analysis."
  
  defaultTheme: auto
  disableThemeToggle: false
  ShowShareButtons: false
  ShowCodeCopyButtons: true

  # Premium Profile Mode Setup
  profileMode:
    enabled: true
    title: "Manoj Sankuru"
    subtitle: >
      **PhD Researcher & Graduate Assistant** <br>
      *Department of Computer and Information Sciences, Clemson University* <br><br>
      Specializing in the intersection of **Large Language Models (LLMs)**, **Reinforcement Learning**, and optimizing concurrent **Multi-Agent Systems** for automated program analysis.
    imageUrl: "images/profile.jpg" 
    imageWidth: 160
    imageHeight: 160
    buttons:
      - name: "🐙 Projects"
        url: "https://github.com/manojsankuru" # Directed straight to GitHub
      - name: "📝 View Publications"
        url: "/publications/"

  # Connected Identity Networks
  socialIcons:
    - name: "github"
      url: "https://github.com/manojsankuru"
    - name: "googlescholar"
      url: "https://scholar.google.com/" 
    - name: "linkedin"
      url: "https://www.linkedin.com/in/manoj-noah-s-0426b5165/" # Updated with your profile
    - name: "email"
      url: "mailto:msankur@clemson.edu"

menu:
  main:
    - name: "Projects"
      url: "https://github.com/manojsankuru" # Main navigation link also routes to GitHub
      weight: 10
    - name: "Publications"
      url: "/publications/"
      weight: 20
    - name: "Academic CV"
      url: "/cv.pdf" 
      weight: 30